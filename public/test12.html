<script>
function calc(a,b,c,d,e,f,g,h,i){
    let totalYear = a;
    let semester = b;

    let presentYear = c; 
    let registeredYear = d;

    let month = e;

    let semesterOddStart = f;
    let semesterOddEnd = g;
    let semesterEvenStart = h;
    let semesterEvenEnd = i;
    console.log("new result");
    let dual = true;
    if(semesterOddStart>semesterOddEnd){
        dual = true;


        let result = presentYear - registeredYear;
        totalYear = totalYear * 2;
        if((month>=1)&&(month<=semesterOddEnd)){ 



            let constant1 = 0;
            let presentSemester = constant1 + 2*(result-1);
                presentSemester = semester + presentSemester;
            if((presentSemester<= totalYear)&&(result >0)){
                return presentSemester + " this is answer 1";
            }else{

                return " sem out of bound i think1"
            }

        }else if((month>=semesterOddStart)&&(month<=12)){



            let constant1 = 2;

            let presentSemester = constant1 + 2*(result-1);
                presentSemester = semester + presentSemester;

            if((presentSemester<= totalYear)&&(result >0)){
                return presentSemester + " this is answer 2";
            }else{

                return " sem out of bound i think2"
            }
        }else if((month>=semesterEvenStart)&&(month<=semesterEvenEnd)){



            let constant1 = 1;

            let presentSemester = constant1 + 2*(result-1);
                presentSemester = semester + presentSemester;
            if((presentSemester<= totalYear)&&(result >0)){
                return presentSemester + " this is answer 3";
            }else{

                return " sem out of bound i think3"
            }
        }else {
            return "out of bound not counting";

        }
    }else{
        return "dual year not counting";
    }
}
