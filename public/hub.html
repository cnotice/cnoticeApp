        const referrer = document.referrer;
        const currentOrigin = window.location.origin;

        if(referrer && referrer.startsWith(currentOrigin)){
            window.history.back();
        }else{
            window.location.href = "/index.html";
        }
    }
// or hide button
document.addEventListener("DOMContentLoaded",function(){
    const backButton = document.getElementsByClassName("introBackIcon");
    const referrer = document.referrer;
    const currentOrigin = window.location.origin;

    if(window.history.length <=1 || !(referrer && referrer.startsWith(currentOrigin))){
            backButton[0].style.visibility = "hidden";
    }
});

<script>
    // Function to refresh the page twice, including browser back button
    function refreshPageTwice() {
        let refreshCount = parseInt(localStorage.getItem('refreshCount')) || 0;

        if (refreshCount < 2) {
            // Increment the refresh count and save it
            refreshCount++;
            localStorage.setItem('refreshCount', refreshCount);

            // Show loading screen and reload the page after 1 second
            document.getElementById('loading').style.display = 'flex';
            setTimeout(() => {
                location.reload();
            }, 1);
        } else {
            // Reset refresh count and remove the loading screen
            localStorage.removeItem('refreshCount');
            document.getElementById('loading').style.display = 'none';
        }
    }


    // Ensure the refresh logic runs when back button is pressed
    window.addEventListener('pageshow', (event) => {
        if (event.persisted || performance.navigation.type === 2) {
            // Page loaded via back button or cache
            refreshPageTwice();
        }
    });

    // Trigger the refresh logic on initial page load
    window.onload = refreshPageTwice;
</script>
