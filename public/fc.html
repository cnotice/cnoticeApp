    <script>

    const subN = localStorage.getItem('subsme');
    document.getElementById("highlighti").innerHTML = subN;

    // const su = localStorage.getItem('subsme');
    const subjectId = localStorage.getItem('subjectId');
    const subAuthor = localStorage.getItem('subjectAuthor');
        // document.getElementById("subject").innerHTML = su;
    
    
    send.addEventListener('click', ()=>{
        stopTimer();
            document.getElementById("111").style.display = "flex";
            document.querySelectorAll(".trophy4xShield").forEach(el=>{
                el.classList.remove("trophy4xShield");
                el.classList.add("trophy4");
            });
            document.querySelectorAll(".timer").forEach(el=>{
                el.classList.remove("timer");
                el.classList.add("trophy");
            })
            document.getElementById("congra").innerHTML = getRandomWord();
            document.getElementById("mess1").style.display ="none";
    let url = "/fc ";
    
    let text = document.getElementById('question').value; 
    let fc = document.getElementById('answercorrect').value; 
    
    let sendData = {
        subjectId : subjectId,
    //     branch : 'computer Science' ,
    // section : 'b ',
    // semester :'5 th',
    // department : 'Engineering',
    // subject : 'data science',
    subjectAuthor : subAuthor,
        branch : 'test' ,
    section : 'test ',
    semester :'test',
    department : 'test',
    subject : 'test',
    author : 'test',

    question : text,
    answer: fc
    }

    // 250926 added
const token = localStorage.getItem('authToken');
    // 250926 added

    let h = new Headers();
            h.append('Content-Type', 'application/json');
    // 250926 added
        h.append('Authorization', `Bearer ${token}`);
    // 250926 added
    let req = new Request(url,{
        // create
        method: 'POST',
        // read
        // method: 'GET',
        // update
        // method: 'PATCH',
        // delete
        // method: 'DELETE',
    
    
        headers: h
        //CREATE,update
        ,
        body: JSON.stringify(sendData)
    })
    
    
    //// CREATE
    // fetch(req).then(res=>res.json()).then((data)=>{
    //     document.getElementById('data').innerHTML = JSON.stringify(data);
    // })
    
    //// READ, UPDATE
    fetch(req).then(res=>res.json()).then((data)=>{
        console.log(data);
        document.getElementById('data').innerHTML = JSON.stringify(data);
    })
    
    
    })
            </script>
