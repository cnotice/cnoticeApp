      <button id="toggleButton">Press and Hold</button>

      <script>
        const button = document.getElementById("toggleButton");
        const div = document.getElementById("myDiv");

        // Show div when button is pressed or touched
        function showDiv() {
          div.style.display = "block";
        }

        // Hide div when button is released or touch ends
        function hideDiv() {
          div.style.display = "none";
        }

        // Mouse events
        button.addEventListener("mousedown", showDiv);
        button.addEventListener("mouseup", hideDiv);
        button.addEventListener("mouseleave", hideDiv);

        // Touch events (for mobile devices)
        button.addEventListener("touchstart", showDiv);
        button.addEventListener("touchend", hideDiv);
        button.addEventListener("touchcancel", hideDiv);
      </script>

  function goBack(){
      const referrer = document.referrer;
      const currentOrigin = window.location.origin;

      if(referrer && referrer.startsWith(currentOrigin)){
          window.history.back();
      }else{
          window.location.href = "/index.html";
      }
  }
  // or hide button
  document.addEventListener("DOMContentLoaded",function(){
    const backButton = document.getElementsByClassName("introBackIcon");
    const referrer = document.referrer;
    const currentOrigin = window.location.origin;

    if(window.history.length <=1 || !(referrer && referrer.startsWith(currentOrigin))){
            backButton[0].style.visibility = "hidden";
    }
  });

  </script>
