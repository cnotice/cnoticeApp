<!-- toggle tag untag button -->
<button id="toggleBtn">Tag</button>
<script>
const button1 = document.getElementById('toggleBtn');

button1.addEventListener('click', function(){
  if (button1.textContent === 'Tag'){
    button1.textContent = 'Untag' ;
  }else{
    button1.textContent = 'Tag';
  }
});

</script>
