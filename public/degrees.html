function sa(x,y){
    let collection = document.getElementById(x).children[0].className;
    if(collection == "hide"){
        document.getElementById(x).children[0].className = "unhide";
        document.getElementById(y).style.display = "none";
    }else if(collection == "unhide"){
        document.getElementById(x).children[0].className = "hide";
        document.getElementById(y).style.display = "table-row";
