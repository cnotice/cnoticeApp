<script>
    function calc(a,b,c,d,e,f,g,h,i){

        let yearStart = 2025;
    let totalYear = a;
    let semester = b;

    let presentYear = c; 
    let registeredYear = d;

    let month = e;
    
    let semesterOddStart = f;
    let semesterOddEnd = g;
    let semesterEvenStart = h;
    let semesterEvenEnd = i;
        console.log("new result");
        
                let test = 2*(presentYear - yearStart -1);
                // console.log(test);
                totalYear = totalYear * 2;


            let dual = true;
            if(semesterOddStart>semesterOddEnd){
                dual = true;


                if((month>=1)&&(month<=semesterOddEnd)){ 
                    let constant = 1;
                    let calculatedSemester = 0;

                    calculatedSemester = test+ constant;
                    if((test>=0)&&(calculatedSemester<=totalYear)&&(semester<calculatedSemester)){
                        return calculatedSemester+ " promoted";
                    }else{
                        return "out of bound";
                    }
                }else if((month>=semesterEvenStart)&&(month<=semesterEvenEnd)){
                    let constant = 2;
                    let calculatedSemester = 0;

                    calculatedSemester = test+ constant;
                    if((test>=0)&&(calculatedSemester<=totalYear)&&(semester<calculatedSemester)){
                        return calculatedSemester + " promoted";
                    }else{
                        return "out of bound";
                    }
                }else if((month>=semesterOddStart)&&(month<=12)){
                    let constant = 3;
                    let calculatedSemester = 0;

                    calculatedSemester = test+ constant;
                    if((test>=0)&&(calculatedSemester<=totalYear)&&(semester<calculatedSemester)){
                        return calculatedSemester + " promoted";
                    }else{
                        return "out of bound";
                    }
                }else {
                    return "out of bound not counting";
                    
                }
            }else{
                return "dual year not counting";
            }
    }
