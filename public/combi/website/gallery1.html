<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
  }

  .slider {
    width: 600px;
    height: 350px;
    position: relative;
    overflow: hidden;
    border-radius: 10px;
  }

  .slides {
    display: flex;
    height: 100%;
    transition: transform 0.7s ease-in-out;
  }

  .slide {
    min-width: 100%;
    height: 100%;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
  }

  .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    margin: 0 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: background 0.3s;
  }

  .dot.active {
    background: white;
  }
</style>
</head>

<body>

<div class="slider">
  <div class="slides">
    <div class="slide"><img src="https://picsum.photos/id/1015/600/350"></div>
    <div class="slide"><img src="https://picsum.photos/id/1016/600/350"></div>
    <div class="slide"><img src="https://picsum.photos/id/1018/600/350"></div>
    <div class="slide"><img src="https://picsum.photos/id/1020/600/350"></div>
  </div>

  <div class="dots">
    <span class="dot active" onclick="goToSlide(0)"></span>
    <span class="dot" onclick="goToSlide(1)"></span>
    <span class="dot" onclick="goToSlide(2)"></span>
    <span class="dot" onclick="goToSlide(3)"></span>
  </div>
</div>

<script>
  const slides = document.querySelector('.slides');
  const dots = document.querySelectorAll('.dot');
  const totalSlides = dots.length;

  let index = 0;
  let interval = setInterval(autoSlide, 3000);

  function autoSlide() {
    index = (index + 1) % totalSlides;
    updateSlider();
  }

  function goToSlide(i) {
    index = i;
    updateSlider();
    resetInterval();
  }

  function updateSlider() {
    slides.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach(dot => dot.classList.remove('active'));
    dots[index].classList.add('active');
  }

  function resetInterval() {
    clearInterval(interval);
    interval = setInterval(autoSlide, 3000);
  }
</script>
