            window.history.back();
        }else{
            
    playSound('bubbleSound');

        }

// or hide button
document.addEventListener("DOMContentLoaded",function(){
    const backButton = document.getElementsByClassName("introBackIcon");
    const referrer = document.referrer;
    const currentOrigin = window.location.origin;

    if(window.history.length <=1 || !(referrer && referrer.startsWith(currentOrigin))){
            backButton[0].style.visibility = "hidden";
    }
});

function playSound(sound, location){
    // alert(sound);
document.getElementById(sound).play();

if(location){
        setTimeout(function() {
// //   console.log("This message appears after 2 seconds.");
window.location= location;
}, 120); // 2000 milliseconds = 2 seconds
}

document.getElementById(sound).currentTime = 0;
}
