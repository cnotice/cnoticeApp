<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2‑Minute Timer</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    #timer {
      font-size: 3em;
      background: #fff;
      padding: 20px 40px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div id="timer">02:00</div>

  <script>
    // initial time: 2 minutes in seconds
    let timeLeft = 2 * 60;
    const timerEl = document.getElementById('timer');

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const seconds = (timeLeft % 60).toString().padStart(2, '0');
      timerEl.textContent = `${minutes}:${seconds}`;

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        // timer done – show modal
        alert('Time is up!');
        // when user clicks OK, redirect:
        window.location.href = 'target.html'; // <-- change this URL as needed
      }

      timeLeft--;
    }

    // start the countdown, update every second
    const timerInterval = setInterval(updateTimer, 1000);
  </script>

</body>
</html>
