<div class="sort">
  Time : <span id="timer" data-time="15">xx:xx</span>
</div>
<!-- new260406 -->

<div class="sort">
  Last Stopped Time : <span id="lastStopped">--:--</span>
</div>
<!-- new260406 -->
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resumeTimer()">Resume</button>
<button onclick="stopTimer()">Stop</button>

<script>
let timerInterval = null;
let timeLeft = 0;
let isPaused = false;

const el = document.getElementById('timer');

// ✅ Initialize time safely
function initTime() {
  const dataTime = parseInt(el.dataset.time, 10);
  timeLeft = isNaN(dataTime) ? 120 : dataTime;
}

// ✅ Update UI
//  00:00 + s
function updateDisplay() {
  const mm = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const ss = String(timeLeft % 60).padStart(2, '0');
  el.textContent = `${mm}:${ss}`;
  if ((timeLeft <= 5)&&timeLeft > 0) {
    el.style.color = "red";
  } else {
    el.style.color = "black";
  }
}
// 00 + s imp
// function updateDisplay() {
//   el.textContent = timeLeft +"s";

//   if (timeLeft <= 5) {
//     el.style.color = "red";
//   } else {
//     el.style.color = "black";
//   }
// }

// ▶️ Start
function startTimer() {
  clearInterval(timerInterval); // prevent duplicate timers
  isPaused = false;

  initTime();
  updateDisplay();

  timerInterval = setInterval(runTimer, 1000);
}

// ⏱️ Core logic (single place)
function runTimer() {
  timeLeft--;

  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    timeLeft = 0;
    updateDisplay();
// new260406
    document.getElementById('lastStopped').textContent = "00:00";
    // new260406
    document.getElementById('111').style.display = "flex";

    if (points2 !== 0) {
      document.getElementById("congra").textContent =
        `tagged : ${points2}\nuntagged : ${points}`;
    } else {
      document.getElementById("congra").textContent = points;
    }

    return;
  }

  updateDisplay();
}

// ⏸️ Pause
function pauseTimer() {
  clearInterval(timerInterval);
  isPaused = true;
}

// ▶️ Resume
function resumeTimer() {
  if (!isPaused) return;

  clearInterval(timerInterval);
  timerInterval = setInterval(runTimer, 1000);
  isPaused = false;
}

// ⛔ Stop (full reset)
// old 260406
// function stopTimer() {
//   clearInterval(timerInterval);
//   isPaused = false;
//   timeLeft = 0;
//   updateDisplay();
// }
// old 260406

// new260406
function stopTimer() {
  clearInterval(timerInterval);
  isPaused = false;

  // 👉 Capture last time BEFORE resetting
  const mm = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const ss = String(timeLeft % 60).padStart(2, '0');
  document.getElementById('lastStopped').textContent = `${mm}:${ss}`;

  // reset timer
  timeLeft = 0;
  updateDisplay();
}
